version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: chess_edu_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: chess_edu
      POSTGRES_USER: chess_user
      POSTGRES_PASSWORD: chess_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chess_user -d chess_edu"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: chess_edu_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
